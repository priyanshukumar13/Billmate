<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | BillMate</title>

  <!-- CSS -->
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-animation"></div>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">
      <h2>Welcome Back</h2>
      <p>Login to manage your bills smartly</p>

      <form autocomplete="off">

        <div class="input-group">
          <input id="loginUsername" type="text" required />
          <label>Username</label>
        </div>

        <div class="input-group">
          <input id="loginPassword" type="password" required />
          <label>Password</label>
        </div>

        <div class="forgot-row">
          <a href="#" id="forgotPasswordLink" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Important: type="button" -->
        <button type="button" id="loginBtn">Login</button>

        <span class="divider">or</span>

        <a href="signup.html" class="signup-link">
          Create new account
        </a>

      </form>
    </div>
  </div>

  <!-- =====================
       Forgot Password Modal
  ====================== -->
  <div id="forgotPasswordModal" class="modal-overlay" style="display:none;">
    <div class="modal-content forgot-password-modal">
      <h3>Reset your password</h3>
      <p class="modal-subtitle">Enter your username or email. We will send an OTP to your email.</p>

      <!-- Step 1 -->
      <div id="forgotStep1" class="forgot-step">
        <div class="input-group">
          <input id="forgotIdentifier" type="text" required />
          <label>Username or Email</label>
        </div>
        <button type="button" id="sendOtpBtn" class="modal-primary-btn">Send OTP</button>
      </div>

      <!-- Step 2 -->
      <div id="forgotStep2" class="forgot-step" style="display:none;">
        <div class="input-group">
          <input id="otpInput" type="text" inputmode="numeric" required />
          <label>OTP</label>
        </div>

        <div class="input-group">
          <input id="newPasswordInput" type="password" required />
          <label>New Password</label>
        </div>

        <div class="input-group">
          <input id="confirmNewPasswordInput" type="password" required />
          <label>Confirm New Password</label>
        </div>

        <button type="button" id="resetPasswordBtn" class="modal-primary-btn">Reset Password</button>
      </div>

      <button type="button" id="closeForgotModalBtn" class="modal-close-btn">Cancel</button>
    </div>
  </div>

 <!-- Inside login.html, at the bottom -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- Load the Helper First -->
<script src="auth.js"></script> 

<!-- Then Load the Login Logic -->
<script src="login.js"></script> 

</body>
</html>
