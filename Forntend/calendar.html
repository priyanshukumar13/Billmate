<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillMate - Calendar</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR (Same as Dashboard) -->
        <aside class="sidebar">
            <div class="logo-area"><span>📑 BillMate</span></div>
            <nav class="side-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="calendar.html" class="active">Calendar</a>
                <a href="expenses.html">Expenses</a>
                <a href="settings.html">Settings</a>
            </nav>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="header-section">
                <h1>Bill Schedule</h1>
                <div class="calendar-controls">
                    <button id="prevMonth" class="btn-budget-settings">◀ Prev</button>
                    <h2 id="monthDisplay">Month Year</h2>
                    <button id="nextMonth" class="btn-budget-settings">Next ▶</button>
                </div>
            </div>

            <div class="card calendar-card">
                <div class="calendar-header-days">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendarGrid" class="calendar-grid">
                    <!-- Days generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
      (async () => {
        const user = await verifyAuthOrRedirect();
        if (!user) window.location.href = 'login.html';
      })();
    </script>
    <script src="calendar.js"></script>
</body>
</html>
