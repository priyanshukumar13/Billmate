<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BillMate - Settings</title>
    <link rel="stylesheet" href="settings.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <img src="icons/invoice.png" alt="Logo" class="logo-icon">
                <span>BillMate</span>
            </div>
            <nav class="side-nav">
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="calendar.html">📅 Calendar</a>
                <a href="expenses.html">📈 Expenses</a>
                <a href="settings.html" class="active">⚙️ Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2>Settings</h2>
                <div class="user-pill"><span id="userName">User</span></div>
            </header>

            <div class="settings-container">
                <!-- Profile Card -->
                <section class="card">
                    <h3>👤 Profile Information</h3>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="displayName" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="text" id="displayEmail" disabled style="background: #f1f5f9; cursor: not-allowed;">
                    </div>
                </section>

                <!-- Preferences Card -->
                <section class="card">
                    <h3>💰 Financial Preferences</h3>
                    <div class="form-group">
                        <label>Primary Currency</label>
                        <select id="currencyPref">
                            <option value="₹">INR (₹)</option>
                            <option value="$">USD ($)</option>
                            <option value="€">EUR (€)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Monthly Budget Limit</label>
                        <input type="number" id="budgetLimit" placeholder="e.g. 50000">
                    </div>
                </section>

                <!-- Appearance -->
                <section class="card">
                    <h3>🌓 Appearance</h3>
                    <div class="toggle-group">
                        <span>Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="darkModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </section>

                <!-- Danger Zone -->
                <section class="card danger-zone">
                    <h3>⚠️ Danger Zone</h3>
                    <p>Once you delete your data, it cannot be undone.</p>
                    <button id="resetDataBtn" class="btn-danger">Reset All App Data</button>
                </section>

                <div class="action-bar">
                    <button id="saveSettingsBtn" class="btn-primary">Save Changes</button>
                </div>
            </div>
        </main>
    </div>

    <script src="theme.js"></script>
    <script src="settings.js"></script>
</body>
</html>
